<!DOCTYPE html>
<html>
<head>
    <title>Sales Copilot</title>
    <style>
        body {
            width: 280px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        h2 {
            font-size: 16px;
            margin: 0 0 12px 0;
        }
        .field {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            margin-top: 4px;
        }
        button:hover { background: #0056b3; }
        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        .saved { color: #28a745; }
    </style>
</head>
<body>
    <h2>Sales Copilot</h2>

    <div class="field">
        <label>API Base URL</label>
        <input type="url" id="apiUrl" placeholder="https://your-app.vercel.app">
    </div>

    <button id="saveBtn">Save Settings</button>
    <button id="toggleBtn" style="background: #28a745; margin-top: 6px;">Toggle Panel on Page</button>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
